name: Build DeskKit

on:
  workflow_dispatch:
    inputs:
      bump:
        description: '发布时版本递增方式（patch=第三位+1）'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Bump version
        id: bump
        run: |
          VERSION=$(node scripts/bump-version.mjs "${{ inputs.bump }}")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to v${VERSION}"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json src-tauri/Cargo.lock
          git commit -m "chore: release ${{ steps.bump.outputs.tag }}"
          git push origin HEAD
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  build-windows:
    needs: [prepare-release]
    if: |
      always() && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        (github.event_name == 'workflow_dispatch' && needs.prepare-release.result == 'success')
      )
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && needs.prepare-release.outputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci

      - name: Build Windows installer
        run: npm run tauri:build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: deskkit-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  build-mac:
    needs: [prepare-release]
    if: |
      always() && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        (github.event_name == 'workflow_dispatch' && needs.prepare-release.result == 'success')
      )
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: mac-arm64
          - target: x86_64-apple-darwin
            name: mac-intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && needs.prepare-release.outputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend deps
        run: npm ci

      - name: Build Mac bundle
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v5
        with:
          name: deskkit-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  release:
    needs: [prepare-release, build-windows, build-mac]
    if: |
      always() &&
      needs.build-windows.result == 'success' &&
      needs.build-mac.result == 'success' && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        (github.event_name == 'workflow_dispatch' && needs.prepare-release.result == 'success')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release assets
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && needs.prepare-release.outputs.tag || github.ref_name }}
        run: |
          mkdir -p release-assets
          ver="${VERSION#v}"
          while IFS= read -r -d '' f; do
            case "$f" in
              *aarch64*|*arm64*) cp "$f" "release-assets/DeskKit-${ver}-mac-arm64.dmg" ;;
              *x64*|*x86_64*) cp "$f" "release-assets/DeskKit-${ver}-mac-intel.dmg" ;;
            esac
          done < <(find artifacts -type f -name '*.dmg' -print0)
          exe="$(find artifacts -type f -name '*-setup.exe' -o -type f -name '*.exe' | head -1)"
          msi="$(find artifacts -type f -name '*.msi' | head -1)"
          if [ -n "$exe" ]; then cp "$exe" "release-assets/DeskKit-${ver}-windows-setup.exe"; fi
          if [ -n "$msi" ]; then cp "$msi" "release-assets/DeskKit-${ver}-windows.msi"; fi
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && needs.prepare-release.outputs.tag || github.ref_name }}
          draft: false
          generate_release_notes: false
          body_path: .github/release-body.md
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
