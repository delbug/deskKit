name: Build DeskKit

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci

      - name: Build Windows installer
        run: npm run tauri:build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: deskkit-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  build-mac:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: mac-arm64
          - target: x86_64-apple-darwin
            name: mac-intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend deps
        run: npm ci

      - name: Build Mac bundle
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v5
        with:
          name: deskkit-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  release:
    needs: [build-windows, build-mac]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release assets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p release-assets
          ver="${VERSION#v}"
          while IFS= read -r -d '' f; do
            case "$f" in
              *aarch64*|*arm64*) cp "$f" "release-assets/DeskKit-${ver}-mac-arm64.dmg" ;;
              *x64*|*x86_64*) cp "$f" "release-assets/DeskKit-${ver}-mac-intel.dmg" ;;
            esac
          done < <(find artifacts -type f -name '*.dmg' -print0)
          exe="$(find artifacts -type f -name '*-setup.exe' -o -type f -name '*.exe' | head -1)"
          msi="$(find artifacts -type f -name '*.msi' | head -1)"
          if [ -n "$exe" ]; then cp "$exe" "release-assets/DeskKit-${ver}-windows-setup.exe"; fi
          if [ -n "$msi" ]; then cp "$msi" "release-assets/DeskKit-${ver}-windows.msi"; fi
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
